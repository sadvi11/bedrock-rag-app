<text x="175" y="340" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854f0b">Titan Embeddings V2 · 1024-dim</text>
<text x="175" y="358" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854f0b">Claude Haiku 4.5 · us-east-1</text>

