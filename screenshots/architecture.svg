<svg width="680" height="530" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg">
<title>bedrock-rag-app architecture</title>
<desc>Financial Document Q&A — Flask API routes to RAG Pipeline which calls AWS Bedrock Titan V2 and Claude Haiku 4.5, stores and retrieves from Supabase pgvector, with AWS infrastructure and GitHub Actions CI/CD</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- User -->
<rect x="290" y="20" width="100" height="36" rx="8" fill="#f1efea" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">User</text>

<!-- Arrow User to Flask -->
<line x1="340" y1="56" x2="340" y2="98" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Flask REST API -->
<rect x="150" y="100" width="380" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
