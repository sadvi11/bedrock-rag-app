<text x="340" y="220" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">RAG Pipeline</text>
<text x="340" y="240" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0f6e56">chunk text → Titan embed → cosine search → Claude answer</text>

